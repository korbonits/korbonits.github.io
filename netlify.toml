[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Route /api/track → the serverless function
[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200

# Basic auth on the analytics page via edge function.
# Set ANALYTICS_USER and ANALYTICS_PASSWORD in Netlify environment variables.
[[edge_functions]]
  path = "/analytics"
  function = "analytics-auth"

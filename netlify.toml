# netlify.toml
# Add this to your korbonits.com root if it doesn't already exist,
# or merge the [functions] block into your existing config.

[build]
  command = "node scripts/build-embeddings.js && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect /api/* to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Basic auth on the analytics page via edge function.
# Set ANALYTICS_USER and ANALYTICS_PASSWORD in Netlify environment variables.
[[edge_functions]]
  path = "/analytics/"
  function = "analytics-auth"

# Markdown content negotiation.  When `Accept: text/markdown` is present
# (and ranked at least as high as `text/html`), serve the build-time `.md`
# variants generated by `src/pages/index.md.ts` (homepage) and
# `src/pages/blog/[slug].md.ts` (each published post).  Browsers requesting
# HTML are unaffected; both variants set `Vary: Accept`.
#
# Two paths intercepted: the homepage (which is what the
# isitagentready.com "Markdown for Agents" check probes) and every
# canonical blog post URL.
[[edge_functions]]
  path = "/"
  function = "markdown-negotiation"

[[edge_functions]]
  path = "/blog/*"
  function = "markdown-negotiation"

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Route /api/track → the serverless function
[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200

# Basic auth on the analytics page via edge function.
# Set ANALYTICS_USER and ANALYTICS_PASSWORD in Netlify environment variables.
# Only guard /analytics/ (the canonical path). Netlify redirects /analytics →
# /analytics/ before the edge function runs, so no auth-on-redirect loop.
[[edge_functions]]
  path = "/analytics/"
  function = "analytics-auth"

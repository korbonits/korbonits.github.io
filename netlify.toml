# netlify.toml
# Add this to your korbonits.com root if it doesn't already exist,
# or merge the [functions] block into your existing config.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect /api/* to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Basic auth on the analytics page via edge function.
# Set ANALYTICS_USER and ANALYTICS_PASSWORD in Netlify environment variables.
[[edge_functions]]
  path = "/analytics/"
  function = "analytics-auth"
